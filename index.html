<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hou Quan Cycler</title>
<style>
  :root {
    --bg: #faf7f2;
    --bg-card: #ffffff;
    --fg: #2a2522;
    --muted: #7a746e;
    --line: #e2dcd4;
    --accent: #8b2a2a;
    --hot: #5a8754;
    --warm: #c08030;
    --cold: #b64040;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  .hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid var(--line);
    background: var(--bg-card);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .hdr h1 {
    margin: 0;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.12em;
  }
  .hdr h1 .glyph-run { color: var(--accent); margin-right: 0.4em; }
  nav button {
    background: transparent;
    border: none;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    color: var(--muted);
    font: inherit;
  }
  nav button.active { color: var(--accent); font-weight: 600; }

  .view { padding: 1.25rem 1.5rem 3rem; max-width: 960px; margin: 0 auto; }
  .view h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-top: 2rem;
    margin-bottom: 0.6rem;
    font-weight: 600;
  }

  .stats { display: flex; gap: 2.5rem; margin-top: 0.5rem; }
  .stat-n {
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
  }
  .stat-l {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  .tiles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 0.5rem;
  }
  .tiles-grid.five {
    grid-template-columns: repeat(5, 1fr);
  }

  .tile {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left: 3px solid transparent;
    padding: 0.9rem 0.6rem;
    text-align: center;
    cursor: pointer;
    font: inherit;
    color: inherit;
    transition: border-color 0.15s, transform 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 120px;
  }
  .tile:hover { border-color: var(--accent); }
  .tile:active { transform: scale(0.98); }
  .tile.prescribed { border-left-color: var(--accent); }
  .tile .glyph { font-size: 2.4rem; line-height: 1; margin-bottom: 0.3rem; color: var(--fg); }
  .tile.prescribed .glyph { color: var(--accent); }
  .tile .name { font-weight: 600; font-size: 0.95rem; }
  .tile .sub { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.5rem; line-height: 1.2; }
  .tile .days { font-size: 0.75rem; letter-spacing: 0.05em; margin-top: auto; }
  .tile.hot .days { color: var(--hot); }
  .tile.warm .days { color: var(--warm); }
  .tile.cold .days { color: var(--cold); }
  .tile.never .days { color: var(--muted); }

  .layer-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }

  .heatmap {
    background: var(--bg-card);
    padding: 0.8rem;
    border: 1px solid var(--line);
    overflow-x: auto;
  }
  .hm-row {
    display: grid;
    grid-template-columns: 140px repeat(7, 1fr);
    gap: 3px;
    align-items: center;
    margin-bottom: 2px;
  }
  .hm-row.header {
    margin-bottom: 4px;
    color: var(--muted);
  }
  .hm-label {
    font-size: 0.8rem;
    padding-right: 0.5rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hm-label .glyph-inline { color: var(--accent); margin-right: 0.3em; }
  .hm-cell {
    height: 18px;
    background: var(--line);
    border-radius: 2px;
  }
  .hm-cell.hit { background: var(--accent); }
  .hm-cell.today { outline: 2px solid var(--accent); outline-offset: 1px; }
  .hm-cell-label {
    text-align: center;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* detail view */
  .back {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    padding: 0;
    margin-bottom: 1rem;
  }
  .back:hover { color: var(--accent); }
  .detail-head { display: flex; gap: 1.2rem; align-items: flex-start; }
  .big-glyph {
    font-size: 4.5rem;
    line-height: 1;
    color: var(--accent);
    flex-shrink: 0;
  }
  .detail-head h2 { margin: 0 0 0.3rem; font-weight: 500; font-size: 1.3rem; text-transform: none; letter-spacing: 0; }
  .mission { margin: 0.2rem 0 0; }
  .why {
    margin: 0.8rem 0 0;
    padding: 0.6rem 0.9rem;
    border-left: 3px solid var(--accent);
    background: var(--bg-card);
    color: var(--muted);
    font-size: 0.9rem;
    font-style: italic;
  }

  .log-form {
    display: grid;
    gap: 0.4rem;
    background: var(--bg-card);
    padding: 1rem;
    border: 1px solid var(--line);
    margin-top: 1.5rem;
  }
  .log-form label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 0.4rem;
  }
  .log-form input, .log-form select, .log-form textarea {
    font: inherit;
    padding: 0.5rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--bg);
  }
  .log-form button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.7rem;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 0.8rem;
    font: inherit;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .log-form button:hover { background: #6e2020; }

  .sessions {
    list-style: none;
    padding: 0;
    margin: 0;
    background: var(--bg-card);
    border: 1px solid var(--line);
  }
  .sessions li {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.6rem;
    padding: 0.6rem 0.9rem;
    border-top: 1px solid var(--line);
    font-size: 0.85rem;
    align-items: baseline;
  }
  .sessions li:first-child { border-top: none; }
  .s-when { color: var(--muted); font-size: 0.78rem; }
  .s-prac { color: var(--fg); }
  .s-dur { color: var(--accent); font-variant-numeric: tabular-nums; font-size: 0.8rem; }
  .s-note { grid-column: 1 / -1; color: var(--muted); font-size: 0.78rem; font-style: italic; padding-top: 0.2rem; }
  .s-del {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; font: inherit; font-size: 0.75rem; padding: 0;
  }
  .s-del:hover { color: var(--cold); }
  .muted { color: var(--muted); font-style: italic; }

  .settings h3 {
    margin-top: 1.5rem;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .big-ta {
    width: 100%;
    min-height: 180px;
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 0.78rem;
    padding: 0.6rem;
    border: 1px solid var(--line);
    background: var(--bg-card);
  }
  .settings button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.55rem 1rem;
    cursor: pointer;
    margin-top: 0.4rem;
    margin-right: 0.4rem;
    font: inherit;
  }
  .settings button.danger { background: #b03030; }
  .settings button:hover { filter: brightness(0.9); }

  /* wizard */
  .wizard { max-width: 680px; }
  .wiz-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 2.2rem 2rem;
    text-align: center;
  }
  .wiz-big-glyph {
    font-size: 4.5rem;
    line-height: 1;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 0.8rem;
  }
  .wiz-h1 {
    margin: 0 0 1rem;
    font-weight: 500;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }
  .wiz-lead {
    text-align: left;
    margin: 0.6rem 0;
    color: var(--fg);
  }
  .wiz-lead.muted { color: var(--muted); }
  .wiz-list {
    list-style: none;
    padding: 0;
    margin: 1rem 0;
    text-align: left;
    display: grid;
    gap: 0.8rem;
  }
  .wiz-list li {
    display: grid;
    grid-template-columns: 3rem 1fr;
    gap: 0.8rem;
    align-items: start;
    padding: 0.6rem 0;
    border-top: 1px solid var(--line);
  }
  .wiz-list li:first-child { border-top: none; }
  .wl-glyph {
    font-size: 2.2rem;
    color: var(--accent);
    line-height: 1;
    text-align: center;
  }
  .wl-name { font-weight: 600; margin-bottom: 0.2rem; }
  .wl-mission { font-size: 0.88rem; color: var(--muted); line-height: 1.4; }
  .wiz-intent {
    width: 100%;
    font: inherit;
    padding: 0.7rem;
    border: 1px solid var(--line);
    background: var(--bg);
    resize: vertical;
    margin: 0.8rem 0;
  }
  .wiz-intent:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .stepper {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin: 1.5rem 0 1rem;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--line);
  }
  .step-dot.active { background: var(--accent); }
  .step-dot.done { background: var(--muted); }
  .wiz-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
  }
  .wiz-nav button {
    font: inherit;
    border: none;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    margin-left: 0.5rem;
  }
  .wiz-nav button.primary {
    background: var(--accent); color: white;
    letter-spacing: 0.04em;
  }
  .wiz-nav button.ghost {
    background: transparent; color: var(--muted);
  }
  .wiz-nav button:hover { filter: brightness(0.9); }

  .intent-banner {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 0.7rem 1rem;
    display: flex;
    gap: 0.8rem;
    align-items: baseline;
    margin-bottom: 1rem;
  }
  .intent-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .intent-text { color: var(--fg); font-style: italic; }

  @media (max-width: 720px) {
    .tiles-grid.five { grid-template-columns: repeat(3, 1fr); }
    .hm-row { grid-template-columns: 100px repeat(7, 1fr); }
    .hm-label { font-size: 0.72rem; }
    .big-glyph { font-size: 3rem; }
    .stats { gap: 1.5rem; }
  }
  @media (max-width: 420px) {
    .tiles-grid.five { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<header class="hdr">
  <h1><span class="glyph-run">猴拳</span>The Hou Quan Cycler</h1>
  <nav>
    <button id="nav-dash" class="active">Dashboard</button>
    <button id="nav-settings">Settings</button>
  </nav>
</header>
<main id="app"></main>

<script>
// =========================================================================
// BU — Foundations (pure data layer)
// =========================================================================

const STATE_KEY = "amonkey_cycler_v1";

const MODULES = [
  {id:"yen",         glyph:"眼", name:"Yen",   subtitle:"Eyes — Observation",            layer:"external", order:1},
  {id:"shou",        glyph:"手", name:"Shou",  subtitle:"Hands — Technique",             layer:"external", order:2},
  {id:"shen_body",   glyph:"身", name:"Shēn",  subtitle:"Body — Flexibility",            layer:"external", order:3},
  {id:"fa",          glyph:"法", name:"Fǎ",    subtitle:"Method — Form",                 layer:"external", order:4},
  {id:"bu",          glyph:"步", name:"Bù",    subtitle:"Footwork — Root",               layer:"external", order:5},
  {id:"jing",        glyph:"精", name:"Jīng",  subtitle:"Essence — The Given",           layer:"internal", order:6},
  {id:"shen_spirit", glyph:"神", name:"Shén",  subtitle:"Spirit — Presence",             layer:"internal", order:7},
  {id:"qi",          glyph:"氣", name:"Qì",    subtitle:"Breath — Energy",               layer:"internal", order:8},
  {id:"li",          glyph:"力", name:"Lì",    subtitle:"Power — Strength",              layer:"internal", order:9},
  {id:"gong",        glyph:"功", name:"Gōng",  subtitle:"Cultivation — Daily Effort",    layer:"internal", order:10}
];

const MISSIONS = {
  yen:         "Train the scanner. Read people, rooms, your own body before acting. Observation is upstream of every other principle.",
  shou:        "Condition, differentiate, sensitize the hands. The small grabbing hand and the smashing hand are different tools.",
  shen_body:   "A body soft like a dragon's breath — flexible, organs massaged by movement, joints that don't snap.",
  fa:          "The framework is a path, not the destination. Pick one form and practice it deeply.",
  bu:          "Borrow power from the ground. Stable trunk, quick feet. Power is rooted in the foot.",
  jing:        "Honor the body you inherited. You can't build Jing — only spend or protect it. Sleep, water, food, rest.",
  shen_spirit: "Position yourself so others are safe. Cultivate the codex. Don't make enemies.",
  qi:          "Learn both roads. Wind Road (nose-mouth, anaerobic, fast) and Fire Road (nose-to-dantian, slow, build).",
  li:          "Actually build strength. Don't romanticize weakness. Muscle is the substrate of skill.",
  gong:        "Keep showing up. Gong is the measurement of the other nine. Be first one."
};

const WHYS = {
  yen:         "You scan the in front of you… when you see he's very strong in every aspect, you make him as a friend. That's the art of war.",
  shou:        "The hands need to be not only fast, quick, strong, also very sensitive. That is my small grabbing one, and that is my smashing one — different skills.",
  shen_body:   "The body should always be soft, like a dragon's breath — to have that kind of soft body, you can accumulate and circulate your energy.",
  fa:          "What kind of style are you doing? Karate, five-ancestor, white crane, praying mantis — this method will help you to get what you actually want, your goal.",
  bu:          "All the power generated in your fist has actually the root on the foot. We borrow the power from the ground.",
  jing:        "The gene that is inherited from generations and generations, from your family scroll to you — that, you can't build.",
  shen_spirit: "You position yourself in a good seat already, because you don't want something behind. Where you are, then it's safe for everybody. Don't make enemies, or we go together.",
  qi:          "Wind Road — nose in, mouth out, for fast anaerobic movement. Fire Road — nose in to the dantian, slow. Most people only train Wind.",
  li:          "A lot of people say, don't use brute force, use your mind — that is a misconception. When it comes to fighting, if you don't have muscles, you don't have power, you are weak.",
  gong:        "If you train once or twice a week, you will gain nothing. I consider myself a slow learner. Even I practice every day. Be first one."
};

const DEFAULT_PRACTICES = {
  yen:         ["Scan drill (2 min)", "Sound-off prediction", "Body scan (5 min)", "Breath-read a stranger", "Mirror posture (30s)"],
  shou:        ["Grip: squeezes + dead hangs", "Ten Hands shadow (5×5)", "Knuckle push-ups 3×5", "Sensitivity trace (eyes closed)"],
  shen_body:   ["Joint circles top-to-bottom", "Xinyi warm-up (5 min)", "Spinal waves (cat-cow + standing)", "Hip openers (butterfly + deep squat sit)"],
  fa:          ["War Monkey 18 Steps — segment", "Monkey Fist Door Greeting", "Your own form (3 slow runs)"],
  bu:          ["Squatting Monkey hold", "Trinity Stance (3 × 1 min)", "Kiba-dachi (1 min)", "Xinyi walking 10+10", "Kettlebell swings ×20"],
  jing:        ["Sleep hours logged", "Water ml logged", "Full rest day", "Body check: used or burned?"],
  shen_spirit: ["Restaurant seat drill", "Four Ends primer (30s)", "Evening line: who did I help?", "Enemy audit"],
  qi:          ["Wind Road 5×30s", "Fire Road 10 min sit", "Bao Dantian compound breathing", "Pre-sleep Fire (10 rounds)"],
  li:          ["The Complex 4/4/4/4/12 (20-min loop)", "EMOM 20 min (swing/press/press/squat)", "Ladder grind (press+squat)", "Ballistics day (swings+snatch)"],
  gong:        ["Daily check-in", "Weekly sweep", "Monthly spotlight"]
};

function baseState() {
  return {
    version: 1,
    practices: structuredClone(DEFAULT_PRACTICES),
    sessions: [],
    config: { wizardCompleted: false, intent: "" },
    createdAt: Date.now()
  };
}

function loadState() {
  const raw = localStorage.getItem(STATE_KEY);
  if (!raw) return baseState();
  try {
    const s = JSON.parse(raw);
    if (!s.practices) s.practices = {};
    for (const m of MODULES) {
      if (!Array.isArray(s.practices[m.id])) s.practices[m.id] = structuredClone(DEFAULT_PRACTICES[m.id]);
    }
    if (!Array.isArray(s.sessions)) s.sessions = [];
    if (!s.config) s.config = { wizardCompleted: false, intent: "" };
    if (typeof s.config.wizardCompleted !== "boolean") s.config.wizardCompleted = false;
    if (typeof s.config.intent !== "string") s.config.intent = "";
    if (!s.createdAt) s.createdAt = Date.now();
    return s;
  } catch (e) {
    console.warn("state parse error — resetting", e);
    return baseState();
  }
}

function saveState(s) {
  localStorage.setItem(STATE_KEY, JSON.stringify(s));
}

function logSession(moduleId, practice, durationMin, note) {
  const s = loadState();
  s.sessions.push({
    id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
    moduleId,
    practice: (practice || "(unnamed)").trim(),
    durationMin: Math.max(0, Math.round(+durationMin || 0)),
    note: (note || "").trim(),
    ts: Date.now()
  });
  saveState(s);
  return s;
}

function deleteSession(id) {
  const s = loadState();
  s.sessions = s.sessions.filter(x => x.id !== id);
  saveState(s);
  return s;
}

function startOfDay(ts) {
  const d = new Date(ts);
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function getDaysSince(moduleId, state) {
  const s = state || loadState();
  const mine = s.sessions.filter(x => x.moduleId === moduleId);
  if (mine.length === 0) return Infinity;
  const last = Math.max(...mine.map(x => x.ts));
  return Math.round((startOfDay(Date.now()) - startOfDay(last)) / 86400000);
}

function getWeekHeatmap(state) {
  const s = state || loadState();
  const today = startOfDay(Date.now());
  const cols = [];
  for (let i = 6; i >= 0; i--) cols.push(today - i * 86400000);
  const grid = {};
  for (const m of MODULES) {
    grid[m.id] = cols.map(day =>
      s.sessions.some(x => x.moduleId === m.id && startOfDay(x.ts) === day)
    );
  }
  return { cols, grid };
}

function getPrescription(state) {
  const s = state || loadState();
  const scored = MODULES.map(m => ({ ...m, daysSince: getDaysSince(m.id, s) }));
  scored.sort((a, b) => {
    if (b.daysSince !== a.daysSince) return b.daysSince - a.daysSince;
    if (a.layer !== b.layer) return a.layer === "external" ? -1 : 1;
    return a.order - b.order;
  });
  return scored.slice(0, 3);
}

function getDayStreak(state) {
  const s = state || loadState();
  const days = new Set(s.sessions.map(x => startOfDay(x.ts)));
  const today = startOfDay(Date.now());
  let cursor = today;
  if (!days.has(cursor)) cursor -= 86400000;
  if (!days.has(cursor)) return 0;
  let n = 0;
  while (days.has(cursor)) { n++; cursor -= 86400000; }
  return n;
}

function exportJson() {
  return JSON.stringify(loadState(), null, 2);
}

function importJson(text) {
  const parsed = JSON.parse(text);
  if (!parsed || typeof parsed !== "object") throw new Error("not an object");
  if (!Array.isArray(parsed.sessions)) throw new Error("missing sessions array");
  saveState(parsed);
  return loadState();
}

// expose for console tinkering (Yen — make the data inspectable)
window.hq = { loadState, saveState, logSession, getDaysSince, getWeekHeatmap, getPrescription, getDayStreak, exportJson, importJson, MODULES };

// =========================================================================
// SHOU — UI helpers
// =========================================================================

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === "class") e.className = v;
      else if (k === "onclick" || k === "onsubmit" || k === "onchange" || k === "oninput") e[k] = v;
      else if (k.startsWith("data-")) e.setAttribute(k, v);
      else e[k] = v;
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === "string" || typeof c === "number"
      ? document.createTextNode(String(c))
      : c);
  }
  return e;
}

function daysLabel(d) {
  if (d === Infinity) return "never";
  if (d === 0) return "today";
  if (d === 1) return "1d ago";
  return d + "d ago";
}

function tempClass(d) {
  if (d === Infinity) return "never";
  if (d === 0 || d === 1) return "hot";
  if (d <= 5) return "warm";
  return "cold";
}

// =========================================================================
// Views
// =========================================================================

let view = "dashboard";     // "dashboard" | "settings" | "wizard"
let activeModuleId = null;  // set → detail view
let wizardStep = 0;         // 0..3

function render() {
  const state = loadState();

  // First-run: force wizard until completed (unless user navigated to settings)
  if (!state.config.wizardCompleted && view !== "settings" && view !== "wizard") {
    view = "wizard"; wizardStep = 0;
  }

  document.getElementById("nav-dash").className = view === "dashboard" && !activeModuleId ? "active" : "";
  document.getElementById("nav-settings").className = view === "settings" ? "active" : "";

  const root = document.getElementById("app");
  root.innerHTML = "";
  if (view === "wizard")   { root.appendChild(renderWizard(state)); return; }
  if (view === "settings") { root.appendChild(renderSettings()); return; }
  if (activeModuleId)      { root.appendChild(renderDetail(activeModuleId)); return; }
  root.appendChild(renderDashboard());
}

function renderWizard(state) {
  const wrap = el("div", { class: "view wizard" });
  const steps = 4;

  const stepper = el("div", { class: "stepper" },
    ...Array.from({ length: steps }, (_, i) =>
      el("div", { class: "step-dot" + (i === wizardStep ? " active" : i < wizardStep ? " done" : "") })
    )
  );

  const nav = (extraLeft) => el("div", { class: "wiz-nav" },
    extraLeft || el("span"),
    el("div", null,
      wizardStep > 0 ? el("button", { class: "ghost", onclick: () => { wizardStep--; render(); } }, "← back") : null,
      wizardStep < steps - 1
        ? el("button", { class: "primary", onclick: () => { wizardStep++; render(); } }, "next →")
        : el("button", { class: "primary", onclick: () => {
            const s = loadState();
            const intent = document.querySelector("#wiz-intent");
            if (intent) s.config.intent = intent.value.trim();
            s.config.wizardCompleted = true;
            saveState(s);
            view = "dashboard"; activeModuleId = null; render();
          } }, "begin →")
    )
  );

  if (wizardStep === 0) {
    wrap.appendChild(el("div", { class: "wiz-card" },
      el("div", { class: "wiz-big-glyph" }, "猴拳"),
      el("h1", { class: "wiz-h1" }, "The Door"),
      el("p", { class: "wiz-lead" },
        "Before entering the door, the rules. This is a practice tracker keyed to " +
        "Grandmaster Jiang Yu Shan's ten principles — five outward, five inward. " +
        "Each is a mission. Miss none for long."
      ),
      el("p", { class: "wiz-lead muted" },
        "The cycler only tracks. You run the practice."
      ),
      stepper,
      nav(el("button", { class: "ghost", onclick: () => {
        const s = loadState();
        s.config.wizardCompleted = true;
        saveState(s);
        view = "dashboard"; render();
      } }, "skip"))
    ));
  } else if (wizardStep === 1) {
    const externals = MODULES.filter(m => m.layer === "external");
    wrap.appendChild(el("div", { class: "wiz-card" },
      el("h1", { class: "wiz-h1" }, "外功 — External 5"),
      el("p", { class: "wiz-lead muted" }, "What people see. Body-facing."),
      el("ul", { class: "wiz-list" },
        ...externals.map(m => el("li", null,
          el("span", { class: "wl-glyph" }, m.glyph),
          el("div", null,
            el("div", { class: "wl-name" }, `${m.name} — ${m.subtitle.split(" — ")[1]}`),
            el("div", { class: "wl-mission" }, MISSIONS[m.id])
          )
        ))
      ),
      stepper, nav()
    ));
  } else if (wizardStep === 2) {
    const internals = MODULES.filter(m => m.layer === "internal");
    wrap.appendChild(el("div", { class: "wiz-card" },
      el("h1", { class: "wiz-h1" }, "內功 — Internal 5"),
      el("p", { class: "wiz-lead muted" }, "What only you feel. Breath-, mind-, spirit-facing."),
      el("ul", { class: "wiz-list" },
        ...internals.map(m => el("li", null,
          el("span", { class: "wl-glyph" }, m.glyph),
          el("div", null,
            el("div", { class: "wl-name" }, `${m.name} — ${m.subtitle.split(" — ")[1]}`),
            el("div", { class: "wl-mission" }, MISSIONS[m.id])
          )
        ))
      ),
      stepper, nav()
    ));
  } else if (wizardStep === 3) {
    wrap.appendChild(el("div", { class: "wiz-card" },
      el("h1", { class: "wiz-h1" }, "One intent"),
      el("p", { class: "wiz-lead" },
        "What's one thing you want to build this cycle? A short line, your own words. " +
        "Shown at the top of your dashboard."
      ),
      el("textarea", {
        id: "wiz-intent",
        class: "wiz-intent",
        placeholder: "e.g. breathe better under stress · build wiry strength · show up daily",
        rows: 3,
        value: state.config.intent || ""
      }),
      el("blockquote", { class: "why" },
        "\"If you train once or twice a week, you will gain nothing. Even I practice every day. Be first one.\" — Jiang Yu Shan"
      ),
      stepper, nav()
    ));
  }

  return wrap;
}

function renderDashboard() {
  const state = loadState();
  const prescription = getPrescription(state);
  const { cols, grid } = getWeekHeatmap(state);
  const streak = getDayStreak(state);
  const today = startOfDay(Date.now());

  const externals = MODULES.filter(m => m.layer === "external");
  const internals = MODULES.filter(m => m.layer === "internal");

  const wrap = el("div", { class: "view" });

  if (state.config && state.config.intent) {
    wrap.appendChild(el("div", { class: "intent-banner" },
      el("span", { class: "intent-label" }, "intent"),
      el("span", { class: "intent-text" }, state.config.intent)
    ));
  }

  wrap.appendChild(el("div", { class: "stats" },
    el("div", null,
      el("div", { class: "stat-n" }, String(streak)),
      el("div", { class: "stat-l" }, "day streak")
    ),
    el("div", null,
      el("div", { class: "stat-n" }, String(state.sessions.length)),
      el("div", { class: "stat-l" }, "sessions")
    ),
    el("div", null,
      el("div", { class: "stat-n" }, String(MODULES.filter(m => getDaysSince(m.id, state) <= 6).length) + "/10"),
      el("div", { class: "stat-l" }, "modules this week")
    )
  ));

  wrap.appendChild(el("h2", null, "Today's prescription"));
  wrap.appendChild(el("div", { class: "tiles-grid" },
    ...prescription.map(m => renderTile(m, state, true))
  ));

  wrap.appendChild(el("h2", null, "External 外功 — what people see"));
  wrap.appendChild(el("div", { class: "tiles-grid five" },
    ...externals.map(m => renderTile(m, state, false))
  ));

  wrap.appendChild(el("h2", null, "Internal 內功 — what only you feel"));
  wrap.appendChild(el("div", { class: "tiles-grid five" },
    ...internals.map(m => renderTile(m, state, false))
  ));

  wrap.appendChild(el("h2", null, "Last 7 days"));
  const hm = el("div", { class: "heatmap" });
  const labels = cols.map(ts => ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(ts).getDay()]);
  hm.appendChild(el("div", { class: "hm-row header" },
    el("div", { class: "hm-label" }, ""),
    ...labels.map(l => el("div", { class: "hm-cell-label" }, l))
  ));
  MODULES.forEach(m => {
    hm.appendChild(el("div", { class: "hm-row" },
      el("div", { class: "hm-label" },
        el("span", { class: "glyph-inline" }, m.glyph),
        m.name
      ),
      ...grid[m.id].map((hit, i) =>
        el("div", {
          class: "hm-cell" + (hit ? " hit" : "") + (cols[i] === today ? " today" : "")
        })
      )
    ));
  });
  wrap.appendChild(hm);

  return wrap;
}

function renderTile(m, state, prescribed) {
  const d = getDaysSince(m.id, state);
  return el("button", {
    class: `tile ${tempClass(d)} ${prescribed ? "prescribed" : ""}`,
    onclick: () => { activeModuleId = m.id; view = "dashboard"; render(); }
  },
    el("div", { class: "glyph" }, m.glyph),
    el("div", { class: "name" }, m.name),
    el("div", { class: "sub" }, m.subtitle),
    el("div", { class: "days" }, daysLabel(d))
  );
}

function renderDetail(moduleId) {
  const state = loadState();
  const m = MODULES.find(x => x.id === moduleId);
  const practices = state.practices[moduleId] || [];
  const mine = state.sessions
    .filter(x => x.moduleId === moduleId)
    .sort((a, b) => b.ts - a.ts)
    .slice(0, 10);

  const wrap = el("div", { class: "view" });
  wrap.appendChild(el("button", {
    class: "back",
    onclick: () => { activeModuleId = null; render(); }
  }, "← back to dashboard"));

  wrap.appendChild(el("div", { class: "detail-head" },
    el("div", { class: "big-glyph" }, m.glyph),
    el("div", null,
      el("h2", null, `${m.name} — ${m.subtitle}`),
      el("p", { class: "mission" }, MISSIONS[moduleId]),
      el("blockquote", { class: "why" }, `"${WHYS[moduleId]}"`)
    )
  ));

  const form = el("form", { class: "log-form" });
  form.appendChild(el("label", null, "Practice"));
  const sel = el("select", { name: "practice" },
    ...practices.map(p => el("option", { value: p }, p)),
    el("option", { value: "" }, "— custom below —")
  );
  form.appendChild(sel);
  const customIn = el("input", { name: "custom", placeholder: "…or type a custom practice" });
  form.appendChild(customIn);
  form.appendChild(el("label", null, "Duration (minutes)"));
  form.appendChild(el("input", { name: "duration", type: "number", min: "0", value: "5" }));
  form.appendChild(el("label", null, "Note (optional)"));
  form.appendChild(el("input", { name: "note", placeholder: "how did it feel?" }));
  form.appendChild(el("button", { type: "submit" }, "Log session"));
  form.onsubmit = (e) => {
    e.preventDefault();
    const custom = customIn.value.trim();
    const practice = custom || sel.value || "(unnamed)";
    const dur = form.querySelector("[name=duration]").value;
    const note = form.querySelector("[name=note]").value;
    logSession(moduleId, practice, dur, note);
    render();
  };
  wrap.appendChild(form);

  wrap.appendChild(el("h2", null, "Recent sessions"));
  if (mine.length === 0) {
    wrap.appendChild(el("p", { class: "muted" }, "No sessions yet. The first one is the hardest."));
  } else {
    const list = el("ul", { class: "sessions" });
    mine.forEach(s => {
      const d = new Date(s.ts);
      const when = d.toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
      list.appendChild(el("li", null,
        el("span", { class: "s-when" }, when),
        el("span", { class: "s-prac" }, s.practice),
        el("span", { class: "s-dur" }, s.durationMin + " min"),
        el("button", { class: "s-del", title: "delete session", onclick: () => { deleteSession(s.id); render(); } }, "×"),
        s.note ? el("span", { class: "s-note" }, s.note) : null
      ));
    });
    wrap.appendChild(list);
  }

  return wrap;
}

function renderSettings() {
  const wrap = el("div", { class: "view settings" });
  wrap.appendChild(el("h2", null, "Data"));

  wrap.appendChild(el("h3", null, "Export"));
  const exTa = el("textarea", { class: "big-ta", readOnly: true });
  exTa.value = exportJson();
  wrap.appendChild(exTa);
  wrap.appendChild(el("button", {
    onclick: () => {
      const blob = new Blob([exportJson()], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = el("a", { href: url, download: `hou-quan-cycler-${new Date().toISOString().slice(0,10)}.json` });
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }
  }, "Download JSON"));
  wrap.appendChild(el("button", {
    onclick: () => { exTa.select(); document.execCommand && document.execCommand("copy"); }
  }, "Copy to clipboard"));

  wrap.appendChild(el("h3", null, "Import"));
  const impTa = el("textarea", { class: "big-ta", placeholder: "Paste exported JSON here" });
  wrap.appendChild(impTa);
  wrap.appendChild(el("button", {
    onclick: () => {
      try {
        importJson(impTa.value);
        alert("Imported.");
        view = "dashboard"; activeModuleId = null; render();
      } catch (e) {
        alert("Bad JSON: " + e.message);
      }
    }
  }, "Import JSON"));

  wrap.appendChild(el("h3", null, "Danger"));
  wrap.appendChild(el("button", {
    class: "danger",
    onclick: () => {
      if (confirm("Wipe all sessions and custom practices? This cannot be undone.")) {
        localStorage.removeItem(STATE_KEY);
        view = "dashboard"; activeModuleId = null; render();
      }
    }
  }, "Reset all data"));

  wrap.appendChild(el("h3", null, "Intro"));
  wrap.appendChild(el("button", {
    onclick: () => {
      const s = loadState();
      s.config.wizardCompleted = false;
      saveState(s);
      view = "wizard"; wizardStep = 0; activeModuleId = null; render();
    }
  }, "Show the Door (wizard)"));

  wrap.appendChild(el("h3", null, "About"));
  wrap.appendChild(el("p", { class: "muted" },
    "Keyed to the ten principles (5 external + 5 internal) from context.md. " +
    "Data stays on this device. Export to back up or move."
  ));

  return wrap;
}

// =========================================================================
// Wiring
// =========================================================================

document.getElementById("nav-dash").onclick = () => { view = "dashboard"; activeModuleId = null; render(); };
document.getElementById("nav-settings").onclick = () => { view = "settings"; activeModuleId = null; render(); };

render();
</script>
</body>
</html>
